<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ТЕПЕ bite</title>
    <meta name="description" content="ТЕПЕ bite — link hub" />
    <style>
      :root {
        --bg: #f2e7d8;
        --surface: #f7efe4;
        --text: #4a2e57;
        --muted: #7a637f;
        --accent: #c47a3a;
        --accent-dark: #aa662f;
        --outline: rgba(74, 46, 87, 0.14);
        --shadow: 0 12px 40px rgba(74, 46, 87, 0.12);
        --hero-shadow: 0 16px 50px rgba(74, 46, 87, 0.14);
        --radius-xl: 28px;
        --radius-lg: 20px;
        --radius-md: 14px;
        --max-width: 520px;
        --card-padding-x: 26px;
        --card-padding-y: 26px;
        --hero-top-extra-padding: -10px;
      }

      * {
        box-sizing: border-box;
      }
      html {
        -webkit-text-size-adjust: 100%;
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
        background:
          radial-gradient(
            circle at top,
            rgba(196, 122, 58, 0.12),
            transparent 34%
          ),
          linear-gradient(180deg, #f6ecdf 0%, var(--bg) 100%);
        color: var(--text);
        min-height: 100vh;
        position: relative;
        overflow-x: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
      }

      body::after {
        background: linear-gradient(
          180deg,
          rgba(242, 231, 216, 0.16),
          rgba(242, 231, 216, 0.52)
        );
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .page {
        width: 100%;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        padding-top: 20px;
        padding-bottom: 20px;
        padding-left: 7px;
        padding-right: 7px;
        position: relative;
        z-index: 1;
      }

      .shell {
        width: 100%;
        max-width: var(--max-width);
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .lang-bar {
        display: flex;
        justify-content: flex-end;
      }

      .lang-switch {
        display: inline-flex;
        background: rgba(255, 255, 255, 0.55);
        border: 1px solid var(--outline);
        border-radius: 999px;
        padding: 4px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
      }

      .lang-btn {
        border: 0;
        background: transparent;
        color: var(--muted);
        padding: 10px 14px;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition: 180ms ease;
      }

      .lang-btn.active {
        background: var(--text);
        color: #fff;
      }

      .card {
        background: rgba(255, 255, 255, 0.62);
        border: 1px solid var(--outline);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
      }

      .hero {
        text-align: center;
        box-shadow: var(--hero-shadow);
        padding: calc(var(--card-padding-y) + var(--hero-top-extra-padding))
          var(--card-padding-x) var(--card-padding-y);
      }

      .logo-wrap {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        margin-bottom: 18px;
      }

      .logo-wrap img {
        width: min(280px, 82vw);
        height: auto;
        display: block;
      }

      .headline {
        margin: 0;
        font-size: clamp(27px, 6vw, 38px);
        line-height: 1.06;
        letter-spacing: -0.03em;
        font-weight: 800;
        max-width: 500px;
        color: var(--text);
        margin: 0 auto;
      }

      .subline {
        margin: 10px auto 0;
        max-width: 48ch;
        font-size: 15px;
        line-height: 1.55;
        color: var(--muted);
        text-align: justify;
      }

      .cause-wrap {
        margin-top: 25px;
        display: grid;
        justify-items: center;
        gap: 0;
        width: 100%;
        position: relative;
        padding-bottom: 18px;
      }

      .cause {
        display: grid;
        grid-template-columns: 18px minmax(0, 1fr);
        align-items: center;
        gap: 10px;
        border-radius: 10px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.98),
          rgba(255, 255, 255, 0.7)
        );
        color: var(--text);
        font-size: 13px;
        line-height: 1.35;
        font-weight: 700;
        text-align: left;
        width: 100%;
        overflow: hidden;
        border: 1px solid var(--text);
        border-bottom-width: 2px;
      }

      .cause-icon {
        background-color: var(--text);
        height: 100%;
        align-items: center;
        justify-content: center;
        display: inline-flex;
        padding-left: 10px;
        padding-right: 6px;
        width: 35px;
      }

      .cause-text {
        display: block;
        color: var(--text);
        padding-top: 8px;
        padding-bottom: 12px;
        padding-left: 18px;
        padding-right: 20px;
        text-align: justify;
      }

      .cause-link {
        position: absolute;
        right: 14px;
        bottom: 3px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
        max-width: min(88%, 360px);
        text-decoration: underline;
        padding: 7px 12px;
        border-radius: 999px;
        border: 1px solid rgba(74, 46, 87, 0.2);
        background: rgb(255, 255, 255);
        box-shadow: 0 8px 20px rgba(74, 46, 87, 0.1);
        font-size: 9px;
        line-height: 1.1;
        color: rgba(74, 46, 87, 0.86);
        text-align: left;
        white-space: nowrap;
      }

      .cause-link-icon {
        width: 14px;
        height: 14px;
        color: var(--text);
        flex: 0 0 auto;
      }

      .cause-link-text {
        min-width: 0;
        white-space: nowrap;
        font-size: 1em;
      }

      .cause-link:hover,
      .cause-link:focus-visible {
        color: var(--text);
        border-color: rgba(74, 46, 87, 0.35);
        box-shadow: 0 10px 24px rgba(74, 46, 87, 0.12);
        outline: none;
      }

      .links-card {
        padding: var(--card-padding-y) var(--card-padding-x);
      }

      .links-title {
        margin: 4px 6px 12px;
        font-size: 14px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .link-list {
        display: grid;
        gap: 10px;
      }

      .link-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 16px;
        border-radius: var(--radius-lg);
        border: 1px solid rgba(74, 46, 87, 0.08);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.92),
          rgba(255, 255, 255, 0.8)
        );
        transition:
          transform 180ms ease,
          border-color 180ms ease,
          box-shadow 180ms ease;
      }

      .link-item:hover,
      .link-item:focus-visible {
        transform: translateY(-1px);
        border-color: rgba(196, 122, 58, 0.32);
        box-shadow: 0 10px 28px rgba(74, 46, 87, 0.1);
        outline: none;
      }

      .link-item.primary {
        border-color: rgba(196, 122, 58, 0.28);
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.98),
          rgba(255, 248, 242, 0.88)
        );
        box-shadow: 0 14px 34px rgba(196, 122, 58, 0.14);
        position: relative;
        overflow: hidden;
      }

      .link-item.primary::before {
        content: "";
        position: absolute;
        inset: 0 auto 0 0;
        width: 5px;
        background: linear-gradient(180deg, var(--accent), var(--accent-dark));
      }

      .link-item.primary .icon {
        background: rgba(196, 122, 58, 0.18);
        color: var(--accent-dark);
      }

      .link-main {
        display: flex;
        align-items: center;
        gap: 14px;
        min-width: 0;
      }

      .icon {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        background: rgba(196, 122, 58, 0.12);
        color: var(--accent);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        flex: 0 0 auto;
      }

      .icon svg {
        width: 21px;
        height: 21px;
        display: block;
      }
      .link-copy {
        min-width: 0;
      }

      .link-label {
        display: block;
        font-size: 16px;
        line-height: 1.2;
        font-weight: 800;
        color: var(--text);
      }

      .link-hint {
        display: block;
        margin-top: 4px;
        font-size: 13px;
        line-height: 1.35;
        color: var(--muted);
      }

      .arrow {
        width: 20px;
        height: 20px;
        color: var(--muted);
        flex: 0 0 auto;
      }

      .socials-card {
        padding: 16px;
        text-align: center;
      }

      .socials-title {
        margin: 0 0 12px;
        font-size: 14px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
      }

      .social-row {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 10px;
      }

      .social-link {
        width: 52px;
        height: 52px;
        border-radius: 16px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.92),
          rgba(255, 255, 255, 0.78)
        );
        border: 1px solid rgba(74, 46, 87, 0.08);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--text);
        transition:
          transform 180ms ease,
          border-color 180ms ease;
      }

      .social-link:hover,
      .social-link:focus-visible {
        transform: translateY(-1px);
        border-color: rgba(196, 122, 58, 0.32);
        outline: none;
      }

      .social-link svg {
        width: 22px;
        height: 22px;
        display: block;
      }

      .footer {
        text-align: center;
        padding: 6px 8px 12px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.6;
      }

      .footer strong {
        color: var(--text);
        font-weight: 800;
      }

      @media (max-width: 420px) {
        .cause {
          width: 100%;
          border-radius: 18px;
        }

        .cause-link {
          right: 10px;
          max-width: calc(100% - 20px);
        }
      }

      @media (min-width: 641px) {
        .page {
          padding-top: 30px;
          padding-bottom: 34px;
        }
        .cause {
          min-width: min(100%, 470px);
        }

        .links-card,
        .socials-card {
          padding: 18px;
        }
      }

      .cause-icon svg {
        color: #fff;
      }
    </style>
  </head>

    <script>
      const content = {
        bg: {
          headline: "Барче с характер, вдъхновено от Пловдив.",
          description:
            "Чист вкус, модерна визия и градска енергия. Открий нашите канали, истории и проекта зад марката.",
          cause:
            "Част от всяка покупка подпомага грижа и развитие на тепетата.",
          causeLink: "Виж политиката ни за грижа към символите на Пловдив",
          linksTitle: "Открий още",
          websiteLabel: "Нашият сайт",
          websiteHint: "Основна информация за марката",
          instagramLabel: "Instagram",
          instagramHint: "Новини, визия и моменти от марката",
          facebookLabel: "Facebook",
          facebookHint: "Общност, новини и събития",
          projectsLabel: "Нашите социални проекти",
          projectsHint: "Каузи, партньорства и въздействие",
          mediaLabel: "Медиите за нас",
          mediaHint: "Публикации, интервюта и истории",
          socialTitle: "Последвай ни",
          tiktokLabel: "TikTok",
          tiktokHint: "Кратки видеа и behind-the-scenes",
          youtubeLabel: "YouTube",
          youtubeHint: "Видеа, истории и по-дълго съдържание",
          entity: "БАИР ЕООД",
          footer: "ТЕПЕ bite · Пловдив",
        },
        en: {
          headline: "A bar with character, inspired by Plovdiv.",
          description:
            "Clean taste, modern identity, and urban energy. Explore our channels, stories, and the project behind the brand.",
          cause:
            "Part of every purchase supports the care and development of the hills of Plovdiv.",
          causeLink: "See our policy for caring for Plovdiv's symbols",
          linksTitle: "Explore more",
          websiteLabel: "Our website",
          websiteHint: "Main information about the brand",
          instagramLabel: "Instagram",
          instagramHint: "News, visuals, and brand moments",
          facebookLabel: "Facebook",
          facebookHint: "Community, updates, and events",
          projectsLabel: "Our social projects",
          projectsHint: "Causes, partnerships, and impact",
          mediaLabel: "Media about us",
          mediaHint: "Articles, interviews, and stories",
          socialTitle: "Follow us",
          tiktokLabel: "TikTok",
          tiktokHint: "Short videos and behind the scenes",
          youtubeLabel: "YouTube",
          youtubeHint: "Videos, stories, and longer-form content",
          entity: "BAIR LTD",
          footer: "ТЕПЕ bite · Plovdiv",
        },
      };

      const setLanguage = (lang) => {
        document.documentElement.lang = lang;
        document.querySelectorAll("[data-i18n]").forEach((node) => {
          const key = node.getAttribute("data-i18n");
          if (content[lang][key]) node.textContent = content[lang][key];
        });

        document.querySelectorAll("[data-lang-btn]").forEach((btn) => {
          btn.classList.toggle("active", btn.dataset.langBtn === lang);
        });

        localStorage.setItem("tepe-lang", lang);
        requestAnimationFrame(fitCauseLinkText);
      };

      const fitCauseLinkText = () => {
        const causeLink = document.querySelector(".cause-link");
        const causeLinkText = document.querySelector(".cause-link-text");
        if (!causeLink || !causeLinkText) return;

        const maxFontSize = 9;
        const minFontSize = 4.2;
        const step = 0.2;

        let currentSize = maxFontSize;
        causeLinkText.style.fontSize = `${currentSize}px`;

        while (
          currentSize > minFontSize &&
          causeLink.scrollWidth > causeLink.clientWidth
        ) {
          currentSize -= step;
          causeLinkText.style.fontSize = `${currentSize}px`;
        }

        if (causeLink.scrollWidth > causeLink.clientWidth) {
          causeLinkText.style.fontSize = `${minFontSize}px`;
        }
      };

      const savedLang = localStorage.getItem("tepe-lang");
      const browserLang =
        navigator.language && navigator.language.toLowerCase().startsWith("bg")
          ? "bg"
          : "en";
      const initialLang = savedLang || browserLang || "bg";
      setLanguage(initialLang);

      window.addEventListener("resize", fitCauseLinkText);

      document.querySelectorAll("[data-lang-btn]").forEach((btn) => {
        btn.addEventListener("click", () => setLanguage(btn.dataset.langBtn));
      });
    </script>
